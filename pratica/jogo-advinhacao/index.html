<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>GuessGame</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="game">
        <h1 class="game-title" >ADIVINHE O NÚMERO!</h1>
        <div class="how-to-play">
            <div class="how-to-play-title">
                <h3>COMO JOGAR?</h3>
            </div>
            <ol>
              <li>Escolha o número de 1 a 100</li>
              <li>Digite o seu palpite</li>
              <li>Receba dicas</li>
              <li>Acerte o número secreto</li>
            </ol>   
        </div>
        <label for="attempt"></label>
        <div class="input-send">
          <input id="attempt" type="number" placeholder="SEU PALPITE:" />
          <button type="button" onclick="verifyAttempt()">CHUTAR</button>
        </div>
        <p id="win">Parabéns! Você acertou o número secreto!</p>
        <p id="greater">Dica: Seu palpite é maior que o número secreto!</p>
        <p id="lowest">Dica: Seu palpite é menor que o número secreto</p>
        <div class="attempts">
          <p id="attempts-id">TENTATIVAS: 5</p>
        </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
